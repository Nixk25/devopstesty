apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: reservations-production

resources:
  - ../base

namePrefix: prod-

patches:
  - target:
      kind: Deployment
      name: reservation-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  - target:
      kind: Ingress
      name: reservation-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: reservations.local

  - target:
      kind: Secret
      name: db-credentials
    patch: |
      - op: replace
        path: /stringData/DATABASE_URL
        value: "postgresql://reservations:prodpassword@prod-db-service:5432/reservations"
