apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: reservations-production

resources:
  - ../base

namePrefix: prod-

patches:
  - target:
      kind: Deployment
      name: reservation-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  - target:
      kind: Ingress
      name: reservation-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: reservations.local

  - target:
      kind: Secret
      name: db-credentials
    patch: |
      - op: replace
        path: /data/DATABASE_URL
        value: cG9zdGdyZXNxbDovL3Jlc2VydmF0aW9uczpwcm9kcGFzc3dvcmRAcHJvZC1kYi1zZXJ2aWNlOjU0MzIvcmVzZXJ2YXRpb25z
      - op: replace
        path: /data/POSTGRES_PASSWORD
        value: cHJvZHBhc3N3b3Jk
