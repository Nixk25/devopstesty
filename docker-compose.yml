services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://reservations:reservations@db:5432/reservations
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=reservations
      - POSTGRES_PASSWORD=reservations
      - POSTGRES_DB=reservations
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservations"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
